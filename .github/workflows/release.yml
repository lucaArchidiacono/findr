name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: findr-darwin-arm64
          - os: ubuntu-latest
            artifact: findr-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile src/index.tsx --outfile dist/${{ matrix.artifact }}

      - name: Package tarball
        run: |
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256 || shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version and checksums
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "sha_darwin_arm64=$(awk '{print $1}' artifacts/findr-darwin-arm64.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x64=$(awk '{print $1}' artifacts/findr-linux-x64.tar.gz.sha256)" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.meta.outputs.sha_darwin_arm64 }}
          SHA_LINUX_X64: ${{ steps.meta.outputs.sha_linux_x64 }}
        run: |
          cat > Formula/findr.rb << EOF
          class Findr < Formula
            desc "Terminal UI meta-search client with plugin architecture"
            homepage "https://github.com/lucaArchidiacono/findr"
            version "${VERSION}"
            license "GPL-3.0-only"

            on_macos do
              url "https://github.com/lucaArchidiacono/findr/releases/download/v${VERSION}/findr-darwin-arm64.tar.gz"
              sha256 "${SHA_DARWIN_ARM64}"
            end

            on_linux do
              url "https://github.com/lucaArchidiacono/findr/releases/download/v${VERSION}/findr-linux-x64.tar.gz"
              sha256 "${SHA_LINUX_X64}"
            end

            def install
              Dir.glob("findr-*").each do |f|
                bin.install f => "findr"
              end
            end

            test do
              assert_predicate bin/"findr", :executable?
            end
          end
          EOF

      - name: Commit and push formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/findr.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update homebrew formula to ${GITHUB_REF_NAME#v}"
          git push origin main
